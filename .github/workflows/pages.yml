name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (fail on warnings)
        run: pnpm run --if-present lint

      - name: Typecheck
        run: pnpm run --if-present typecheck

      - name: Check chapter prose floors
        run: pnpm book:check-chapters

      - name: Build
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Stamp build manifest (codeword + number)
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OUTPUT_DIR: .vitepress/dist
          CODWORDS_FILE: scripts/codewords.txt
        run: node scripts/generate-build-manifest.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
